# hynt/Zipformer-30M-RNNT-Streaming — chunk 32/left-128 (sherpa-onnx ONLINE).
# Chunk nhỏ = độ trễ thấp, ngữ cảnh ít; chunk lớn = chính xác hơn, chậm hơn.
# Cần tokens.txt (sinh từ bpe.model — xem 01_run_model.ipynb).
name: zipformer_30m_chunk32
adapter: benchmark.adapters.sherpa_onnx_transducer.SherpaOnnxTransducerAdapter
sample_rate: 16000
params:
