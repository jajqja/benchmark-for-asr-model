# hynt/Zipformer-30M-RNNT-Streaming — chunk 64/left-128 (sherpa-onnx ONLINE).
# Chunk nhỏ = độ trễ thấp, ngữ cảnh ít; chunk lớn = chính xác hơn, chậm hơn.
# Cần tokens.txt (sinh từ bpe.model — xem 01_run_model.ipynb).
name: zipformer_30m_chunk64
adapter: benchmark.adapters.sherpa_onnx_transducer.SherpaOnnxTransducerAdapter
sample_rate: 16000
params:
  mode: online
  repo_id: hynt/Zipformer-30M-RNNT-Streaming-6000h
  encoder: encoder-epoch-31-avg-11-chunk-64-left-128.fp16.onnx
  decoder: decoder-epoch-31-avg-11-chunk-64-left-128.fp16.onnx
  joiner: joiner-epoch-31-avg-11-chunk-64-left-128.fp16.onnx
  tokens: models/zipformer_tokens.txt
  provider: cuda
  num_threads: 4
  decoding_method: greedy_search
  reset_every: 25       # tái tạo recognizer mỗi N utt để chặn RAM (onnxruntime arena); 0 = tắt
  latency_ms: 2560     # ƯỚC LƯỢNG: 64 frame × ~40ms
